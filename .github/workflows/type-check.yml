name: Type Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  type-check:
    name: Type Check
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install dependencies
        run: python -m pip install -r requirements_test.txt

      - name: Type check
        run: scripts/type-check

