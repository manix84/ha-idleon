repos:
  - repo: local
    hooks:
      - id: ha-idleon-version-bump
        name: HA Idleon smart version bump
        entry: scripts/version-bump-hook
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
